<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Регистрация | Synchro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 500px;">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h3>💕 Регистрация в Synchro</h3>
    </div>
    <div class="card-body">
      <form th:action="@{/register}" th:object="${registrationDto}" method="post">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" th:field="*{email}" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Пароль</label>
          <input type="password" th:field="*{password}" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Имя пользователя</label>
          <input type="text" th:field="*{username}" class="form-control" required>
        </div>
        <div class="mb-3 suggestions-container">
          <label class="form-label">Город</label>
          <input type="text" th:field="*{city}" id="cityInput" class="form-control" autocomplete="off" required>
          <div id="suggestionsList" class="suggestions-dropdown"></div>
        </div>
        <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
      </form>
      <div class="mt-3 text-center">
        <a th:href="@{/login}">Уже есть аккаунт? Войти</a>
      </div>
    </div>
  </div>
</div>

<script src="/js/register.js"></script>
</body>
</html>
