<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Вход | Synchro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 400px;">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h3 class="mb-0">💕 Вход в Synchro</h3>
    </div>
    <div class="card-body">
      <form th:action="@{/login}" method="post">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="username" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Пароль</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Войти</button>
      </form>
      <div th:if="${param.error}" class="alert alert-danger mt-3">
        Неверный email или пароль
      </div>
      <div th:if="${param.logout}" class="alert alert-info mt-3">
        Вы вышли из аккаунта
      </div>
      <div class="mt-3 text-center">
        <a th:href="@{/register}">Нет аккаунта? Зарегистрироваться</a>
      </div>

    </div>
  </div>
</div>
<script src="/js/csrf.js"></script>
</body>
</html>
