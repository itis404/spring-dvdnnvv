<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Создать тест | Synchro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-5" style="max-width: 600px;">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h3 class="mb-0">Создать новый тест</h3>
    </div>
    <div class="card-body">
      <form th:action="@{/admin/tests/create}" th:object="${test}" method="post">
        <div class="mb-3">
          <label class="form-label">Название теста</label>
          <input type="text" th:field="*{name}" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Описание</label>
          <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
        </div>
        <div class="mb-3 form-check">
          <input type="checkbox" th:field="*{required}" class="form-check-input">
          <label class="form-check-label">Обязательный тест (пользователь должен пройти при регистрации)</label>
        </div>
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a th:href="@{/admin/tests}" class="btn btn-secondary">Отмена</a>
      </form>
    </div>
  </div>
</div>

</body>
</html>
