<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Добавить вопрос | Synchro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-5" style="max-width: 600px;">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h3 class="mb-0"> Добавить вопрос к тесту</h3>
    </div>
    <div class="card-body">
      <form th:action="@{/admin/tests/{testId}/question/create(testId=${test_id})}" th:object="${question}" method="post">
        <div class="mb-3">
          <label class="form-label">Текст вопроса</label>
          <input type="text" th:field="*{text}" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Сохранить вопрос</button>
        <a th:href="@{/admin/tests/edit/{testId}(testId=${test_id})}" class="btn btn-secondary">Отмена</a>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
