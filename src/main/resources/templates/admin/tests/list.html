<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Управление тестами | Synchro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
      <h3 class="mb-0">Управление тестами</h3>
      <a th:href="@{/admin/tests/create}" class="btn btn-light btn-sm"> Создать тест</a>
    </div>
    <div class="card-body">
      <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Название</th>
          <th>Описание</th>
          <th>Обязательный</th>
          <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="test : ${tests}">
          <td th:text="${test.id}">1</td>
          <td th:text="${test.name}">Название</td>
          <td th:text="${test.description}">Описание</td>
          <td th:text="${test.required} ? 'Да' : 'Нет'">Нет</td>
          <td>
            <a th:href="@{/admin/tests/edit/{id}(id=${test.id})}" class="btn btn-sm btn-warning">Редактировать</a>
            <a th:href="@{/admin/tests/delete/{id}(id=${test.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Удалить тест?')">🗑️ Удалить</a>
          </td>
        </tr>
        <tr th:if="${tests.isEmpty()}">
          <td colspan="5" class="text-center">Нет созданных тестов. Нажмите "Создать тест"</td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
  <div class="mt-3">
    <a th:href="@{/admin/tests}" class="btn btn-secondary">Назад</a>
  </div>
</div>

</body>
</html>
