<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Редактирование теста | Synchro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">
  <div class="card shadow mb-4">
    <div class="card-header bg-primary text-white">
      <h3 class="mb-0">Редактирование теста</h3>
    </div>
    <div class="card-body">
      <form th:action="@{/admin/tests/edit/{id}(id=${test.id})}" th:object="${test}" method="post">
        <div class="mb-3">
          <label class="form-label">Название теста</label>
          <input type="text" th:field="*{name}" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Описание</label>
          <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
        </div>
        <div class="mb-3 form-check">
          <input type="checkbox" th:field="*{required}" class="form-check-input">
          <label class="form-check-label">Обязательный тест</label>
        </div>
        <button type="submit" class="btn btn-primary">Сохранить изменения</button>
        <a th:href="@{/admin/tests}" class="btn btn-secondary">Назад к списку</a>
      </form>
    </div>
  </div>

  <!-- Вопросы теста -->
  <div class="card shadow">
    <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center">
      <h4 class="mb-0"> Вопросы теста</h4>
      <a th:href="@{/admin/tests/{testId}/question/create(testId=${test.id})}" class="btn btn-light btn-sm">➕ Добавить вопрос</a>
    </div>
    <div class="card-body">
      <div th:if="${test.questions.isEmpty()}" class="alert alert-info">
        Нет вопросов. Нажмите "Добавить вопрос"
      </div>
      <div th:each="question, iterStat : ${test.questions}" class="border rounded p-3 mb-3">
        <div class="d-flex justify-content-between align-items-start">
          <h5>
            <span th:text="${iterStat.count}">1</span>.
            <span th:text="${question.text}">Текст вопроса</span>
          </h5>
          <a th:href="@{/admin/tests/{testId}/question/delete/{questionId}(testId=${test.id}, questionId=${question.id})}"
             class="btn btn-sm btn-danger"
             onclick="return confirm('Удалить вопрос?')">Удалить вопрос</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
