<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Уведомления | Synchro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <script src="/js/csrf.js"></script>
</head>
<body class="bg-light">

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h3 class="mb-0"> Уведомления</h3>
    </div>
    <div class="card-body">
      <div th:if="${notifications.isEmpty()}" class="alert alert-info">
        У вас нет уведомлений
      </div>
      <div th:each="notif : ${notifications}"
           th:classappend="${!notif.read} ? 'fw-bold' : ''"
           class="border rounded p-3 mb-2">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <span th:text="${notif.message}">Сообщение</span>
            <br>
            <small class="text-muted" th:text="${#temporals.format(notif.createdAt, 'dd.MM.yyyy HH:mm')}">Дата</small>
          </div>
          <span th:if="${!notif.read}" class="badge bg-primary">Новое</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
