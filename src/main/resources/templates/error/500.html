<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Ошибка сервера | Synchro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-5 text-center">
  <div class="card shadow">
    <div class="card-header bg-danger text-white">
      <h3 class="mb-0"> Ошибка сервера (500)</h3>
    </div>
    <div class="card-body">
      <p th:text="${error}">Произошла внутренняя ошибка сервера</p>
      <p class="text-muted">Наши специалисты уже работают над проблемой</p>
      <a href="/feed" class="btn btn-primary">Вернуться в ленту</a>
      <a href="/profile" class="btn btn-secondary">В профиль</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
