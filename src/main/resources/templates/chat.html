<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Чат | Synchro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <script src="/js/csrf.js"></script>
</head>
<body class="bg-light">

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4" style="max-width: 800px;">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0"> Чат с <span th:text="${otherUser.profile.username}"></span></h4>
    </div>
    <div class="card-body message-container" id="messageContainer">
      <div th:each="msg : ${messages}"
           th:classappend="${msg.sender.id == currentUser.id} ? 'message-sent' : 'message-received'"
           class="message"
           th:attr="data-message-id=${msg.id}">
        <div th:text="${msg.text}">Текст сообщения</div>
        <div class="message-time" th:text="${#temporals.format(msg.sentAt, 'HH:mm')}">12:00</div>
      </div>
    </div>
    <div class="card-footer">
      <div class="input-group">
        <input type="text" id="messageInput" class="form-control" placeholder="Введите сообщение...">
        <button class="btn btn-primary" id="sendBtn">Отправить</button>
      </div>
    </div>
  </div>
</div>

<script th:inline="javascript">
  /*<![CDATA[*/
  const otherUserId = /*[[${otherUser.id}]]*/ null;
  const currentUserId = /*[[${currentUser.id}]]*/ null;
  /*]]>*/

  const messageContainer = document.getElementById('messageContainer');
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');

  let lastMessageId = 0;
  let pollingInterval = null;

  function scrollToBottom() {
      messageContainer.scrollTop = messageContainer.scrollHeight;
  }

  function getLastMessageId() {
      const messages = document.querySelectorAll('.message');
      if (messages.length === 0) return 0;
      const lastMessage = messages[messages.length - 1];
      const msgId = lastMessage.getAttribute('data-message-id');
      return msgId ? parseInt(msgId) : 0;
  }

  function addMessageToChat(msg) {
      const messageDiv = document.createElement('div');
      const isCurrentUser = msg.senderId == currentUserId;
      messageDiv.className = `message ${isCurrentUser ? 'message-sent' : 'message-received'}`;
      messageDiv.setAttribute('data-message-id', msg.id);
      messageDiv.innerHTML = `
          <div>${escapeHtml(msg.text)}</div>
          <div class="message-time">${msg.formattedTime}</div>
      `;
      messageContainer.appendChild(messageDiv);
  }

  async function pollNewMessages() {
    if (!lastMessageId) {
        lastMessageId = getLastMessageId();
    }

    try {
        const response = await fetch(`/messages/api/messages/latest?afterId=${lastMessageId}&otherUserId=${otherUserId}`, {
            credentials: 'include'
        });
        const newMessages = await response.json();

        if (newMessages && newMessages.length > 0) {
            for (const msg of newMessages) {
                addMessageToChat(msg);
                if (msg.id > lastMessageId) {
                    lastMessageId = msg.id;
                }
            }
            scrollToBottom();
        }
      } catch (error) {
          console.error('Ошибка загрузки новых сообщений:', error);
      }
  }

  async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      try {
          const formData = new URLSearchParams();
          formData.append('receiverId', otherUserId);
          formData.append('text', text);

          const response = await fetch('/messages/send', {
              method: 'POST',
              headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
              body: formData
          });

          const data = await response.json();
          if (data.success) {
              const newMsg = {
                  id: data.messageId,
                  text: text,
                  senderId: currentUserId,
                  formattedTime: 'Только что'
              };
              addMessageToChat(newMsg);
              lastMessageId = data.messageId;
              messageInput.value = '';
              scrollToBottom();
          }
      } catch (error) {
          console.error('Ошибка отправки:', error);
          alert('Не удалось отправить сообщение');
      }
  }

  function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
  }

  function init() {
      lastMessageId = getLastMessageId();
      scrollToBottom();

      pollingInterval = setInterval(pollNewMessages, 3000);

      sendBtn.addEventListener('click', sendMessage);
      messageInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') sendMessage();
      });
  }

  window.addEventListener('beforeunload', function() {
      if (pollingInterval) clearInterval(pollingInterval);
  });

  init();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
