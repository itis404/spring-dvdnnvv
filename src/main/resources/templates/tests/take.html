<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Прохождение теста | Synchro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4" style="max-width: 800px;">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h3 class="mb-0" th:text="${test.name}">Название теста</h3>
    </div>
    <div class="card-body">
      <p class="text-muted" th:text="${test.description}">Описание</p>
      <hr>
      <form th:action="@{/tests/{testId}/submit(testId=${test.id})}" method="post">
        <div th:each="question, iterStat : ${questions}" class="mb-4">
          <h5>
            <span th:text="${iterStat.count}">1</span>.
            <span th:text="${question.text}">Текст вопроса</span>
          </h5>
          <div class="ms-3">
            <div class="form-check">
              <input type="radio" th:id="'q' + ${question.id} + '_opt1'" th:name="'question_' + ${question.id}" value="1" class="form-check-input" required>
              <label th:for="'q' + ${question.id} + '_opt1'" class="form-check-label">1 — Абсолютно не согласен</label>
            </div>
            <div class="form-check">
              <input type="radio" th:id="'q' + ${question.id} + '_opt2'" th:name="'question_' + ${question.id}" value="2" class="form-check-input">
              <label th:for="'q' + ${question.id} + '_opt2'" class="form-check-label">2 — Не согласен</label>
            </div>
            <div class="form-check">
              <input type="radio" th:id="'q' + ${question.id} + '_opt3'" th:name="'question_' + ${question.id}" value="3" class="form-check-input">
              <label th:for="'q' + ${question.id} + '_opt3'" class="form-check-label">3 — Нейтрально</label>
            </div>
            <div class="form-check">
              <input type="radio" th:id="'q' + ${question.id} + '_opt4'" th:name="'question_' + ${question.id}" value="4" class="form-check-input">
              <label th:for="'q' + ${question.id} + '_opt4'" class="form-check-label">4 — Согласен</label>
            </div>
            <div class="form-check">
              <input type="radio" th:id="'q' + ${question.id} + '_opt5'" th:name="'question_' + ${question.id}" value="5" class="form-check-input">
              <label th:for="'q' + ${question.id} + '_opt5'" class="form-check-label">5 — Абсолютно согласен</label>
            </div>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Отправить ответы</button>
        <a th:href="@{/tests}" class="btn btn-secondary">Отмена</a>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
