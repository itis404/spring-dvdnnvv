<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Результат теста | Synchro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4" style="max-width: 800px;">
  <div class="card shadow">
    <div class="card-header bg-success text-white">
      <h3 class="mb-0">📊 Результат теста</h3>
    </div>
    <div class="card-body">
      <h4 th:text="${test.name}">Название теста</h4>
      <div class="alert alert-info">
        <strong>Ваш результат:</strong> <span th:text="${totalScore}">0</span> из <span th:text="${maxScore}">0</span> баллов
        <div class="progress mt-2">
          <div class="progress-bar"
               th:style="'width: ' + (${totalScore} * 100 / ${maxScore}) + '%;'">
            <span th:text="${totalScore} * 100 / ${maxScore} + '%'">0%</span>
          </div>
        </div>
      </div>
      <hr>
      <h5>Ваши ответы:</h5>
      <div th:each="answer, iterStat : ${answers}">
        <p>
          <strong><span th:text="${iterStat.count}"></span>. <span th:text="${answer.question.text}"></span></strong><br>
          <span class="text-primary">Ответ: значение <span th:text="${answer.value}"></span></span>
        </p>
      </div>
      <a th:href="@{/tests}" class="btn btn-primary">К списку тестов</a>
      <a th:href="@{/feed}" class="btn btn-secondary">В ленту</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
